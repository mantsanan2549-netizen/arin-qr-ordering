<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ลงทะเบียนร้านค้าใหม่ — ARIN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0A1830', 800: '#0F2038', 700: '#16304F', 600: '#1E3E63' },
          flamingo: { 500: '#FF5C8D', 400: '#FF7FA3', 300: '#FFA8C1', 100: '#FFE3EC' },
          paper: '#F7F8FA', ink: '#1A2233', slate: { 500: '#6B7686', 400: '#8B94A3' },
        },
        fontFamily: { display: ['"IBM Plex Sans Thai"', '"Inter"', 'sans-serif'], body: ['"IBM Plex Sans Thai"', '"Inter"', 'sans-serif'] },
        boxShadow: { card: '0 2px 14px rgba(10,24,48,0.06)', float: '0 8px 30px rgba(10,24,48,0.18)' },
      },
    },
  };
</script>
<style>
  * { font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif; }
  body { background: #0A1830; }
  .fade-in { animation: fadeIn .3s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform:none; } }
  input[type=text]:focus, input[type=tel]:focus { outline: none; box-shadow: 0 0 0 2px #FF5C8D; }
  .spinner { border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="text-ink antialiased min-h-screen">
<div id="app" class="min-h-screen"></div>

<!--
  arin-core.js runs BEFORE this script block. It calls
  `global.supabase.createClient(url, anonKey)` internally and wraps it with
  dedicated methods on `window.ARIN_DB` (e.g. `addRestaurant`, `addTable`) —
  there is no raw `.from()` chaining exposed here, and no separate
  `window.supabase`. It also exposes a `window.ARIN_REALTIME` wrapper. This
  file never handles API keys directly — it only calls `window.ARIN_DB`'s
  methods, and uses `window.ARIN_DB` itself as the readiness check that
  arin-core.js finished setup.
-->
<script src="arin-core.js"></script>

<script>
(function () {
  'use strict';

  const app = document.getElementById('app');

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function renderForm(errorMsg) {
    app.innerHTML = `
      <div class="min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-sm fade-in">
          <div class="w-12 h-12 rounded-2xl bg-flamingo-500 flex items-center justify-center font-display font-bold text-white text-lg mb-6">A</div>
          <h1 class="font-display font-semibold text-2xl text-white mb-1">ลงทะเบียนร้านค้าใหม่</h1>
          <p class="text-white/40 text-sm mb-8">เริ่มต้นใช้งานระบบสั่งอาหารผ่าน QR ของ ARIN</p>

          ${errorMsg ? `<div class="bg-flamingo-500/10 border border-flamingo-500/30 text-flamingo-300 text-sm rounded-xl px-4 py-3 mb-4">${escapeHtml(errorMsg)}</div>` : ''}

          <div class="space-y-3">
            <div>
              <label class="text-white/40 text-xs mb-1 block">ชื่อร้านค้า</label>
              <input id="reg-name" type="text" placeholder="เช่น ครัวคุณยาย" class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm">
            </div>
            <div>
              <label class="text-white/40 text-xs mb-1 block">ชื่อเจ้าของร้าน</label>
              <input id="reg-owner" type="text" placeholder="ชื่อ-นามสกุล" class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm">
            </div>
            <div>
              <label class="text-white/40 text-xs mb-1 block">เบอร์โทรศัพท์</label>
              <input id="reg-phone" type="tel" placeholder="08X-XXX-XXXX" class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm">
            </div>
            <button id="reg-submit" class="w-full py-3.5 rounded-xl bg-flamingo-500 text-white font-semibold active:scale-[0.98] transition flex items-center justify-center gap-2">
              <span id="reg-submit-label">ลงทะเบียนร้านค้า</span>
            </button>
          </div>

          <p class="text-white/25 text-xs mt-6 text-center">เมื่อลงทะเบียนสำเร็จ ระบบจะสร้าง "โต๊ะหมายเลข 1" ให้อัตโนมัติ</p>
        </div>
      </div>`;

    document.getElementById('reg-submit').addEventListener('click', handleRegister);
  }

  function renderSuccess(restaurant) {
    app.innerHTML = `
      <div class="min-h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-sm fade-in text-center">
          <div class="w-14 h-14 rounded-2xl bg-flamingo-500/15 flex items-center justify-center mx-auto mb-6">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FF5C8D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <h1 class="font-display font-semibold text-xl text-white mb-2">ลงทะเบียนสำเร็จ</h1>
          <p class="text-white/40 text-sm mb-1">ร้าน "${escapeHtml(restaurant.name)}" พร้อมใช้งานแล้ว</p>
          <p class="text-white/30 text-xs mb-8">สร้างโต๊ะหมายเลข 1 ให้อัตโนมัติเรียบร้อย</p>
          <a href="owner-portal.html" class="block w-full py-3.5 rounded-xl bg-flamingo-500 text-white text-sm font-semibold text-center">ไปที่ Owner Portal</a>
        </div>
      </div>`;
  }

  async function handleRegister() {
    const nameEl = document.getElementById('reg-name');
    const ownerEl = document.getElementById('reg-owner');
    const phoneEl = document.getElementById('reg-phone');
    const submitBtn = document.getElementById('reg-submit');
    const submitLabel = document.getElementById('reg-submit-label');

    const name = nameEl.value.trim();
    const ownerName = ownerEl.value.trim();
    const phone = phoneEl.value.trim();

    if (!name || !ownerName || !phone) {
      renderForm('กรุณากรอกข้อมูลให้ครบทุกช่อง');
      return;
    }

    if (typeof window.ARIN_DB === 'undefined') {
      renderForm('ยังไม่ได้เชื่อมต่อฐานข้อมูล (ตรวจสอบว่าโหลด arin-core.js สำเร็จหรือไม่)');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-60');
    submitLabel.innerHTML = '';
    const spinner = document.createElement('span');
    spinner.className = 'spinner';
    submitLabel.appendChild(spinner);
    submitLabel.append(' กำลังบันทึก...');

    try {
      // 1) Create the restaurant using the core wrapper function.
      const restaurant = await window.ARIN_DB.addRestaurant({
        name: name,
        owner_name: ownerName,
        phone: phone
      });

      if (!restaurant || !restaurant.id) {
        throw new Error('Failed to create restaurant or retrieve its ID.');
      }

      // 2) Immediately create "table 1" for this restaurant so the customer
      //    app never renders against an empty restaurant_tables list.
      await window.ARIN_DB.addTable({
        restaurant_id: restaurant.id,
        table_number: 1
      });

      renderSuccess(restaurant);
    } catch (error) {
      console.error('Registration error:', error);
      renderForm(error.message || 'เกิดข้อผิดพลาดในการบันทึกข้อมูล');
    }
  }

  renderForm();
})();
</script>
</body>
</html>
