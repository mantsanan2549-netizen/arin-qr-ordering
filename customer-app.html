<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ครัวคุณยาย — สั่งอาหารผ่าน QR | ARIN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0A1830', 800: '#0F2038', 700: '#16304F', 600: '#1E3E63' },
          flamingo: { 500: '#FF5C8D', 400: '#FF7FA3', 300: '#FFA8C1', 100: '#FFE3EC' },
          paper: '#F7F8FA',
          ink: '#1A2233',
          slate: { 500: '#6B7686', 400: '#8B94A3' },
        },
        fontFamily: {
          display: ['"IBM Plex Sans Thai"', '"Inter"', 'sans-serif'],
          body: ['"IBM Plex Sans Thai"', '"Inter"', 'sans-serif'],
        },
        boxShadow: {
          card: '0 2px 14px rgba(10,24,48,0.06)',
          float: '0 8px 30px rgba(10,24,48,0.18)',
        },
      },
    },
  };
</script>
<style>
  * { font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif; }
  body { background: #F7F8FA; }
  ::selection { background: #FF5C8D; color: white; }
  .pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,92,141,0.55); }
    50% { box-shadow: 0 0 0 8px rgba(255,92,141,0); }
  }
  .drawer-enter { transform: translateY(100%); }
  .drawer-open { transform: translateY(0%); transition: transform .32s cubic-bezier(.32,.72,0,1); }
  .drawer-close { transition: transform .28s cubic-bezier(.4,0,1,1); }
  .fade-in { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:none; } }
  .scrollbar-thin::-webkit-scrollbar { height: 4px; width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #E2E5EA; border-radius: 4px; }
  img.menu-img { background: linear-gradient(135deg,#EDEFF3,#F7F8FA); }
</style>
</head>
<body class="text-ink antialiased">

<!-- OFFLINE BANNER (E4) -->
<div id="offline-banner" class="hidden fixed top-0 inset-x-0 z-50 bg-navy-900 text-white text-sm text-center py-2 font-medium">
  📶 ไม่มีสัญญาณอินเทอร์เน็ต — กำลังรอเชื่อมต่อใหม่...
</div>

<div id="app" class="max-w-md mx-auto min-h-screen bg-paper relative pb-28"></div>

<!-- arin-core.js เชื่อมต่อ Supabase จริง ต้องโหลด SDK นี้มาก่อนเสมอ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="arin-core.js"></script>
<script>
/* =========================================================================
 * ARIN QR ORDERING — CUSTOMER APP
 * State machine screens: entry -> error / empty / menu <-> cart -> tracking
 * ========================================================================= */

const app = document.getElementById('app');
const params = new URLSearchParams(location.search);

// ---- 1. QR ENTRY: pull restaurant_id + table straight from the URL (AC-1.1) ----
const restaurantId = params.get('restaurant_id');
const tableNumber = params.get('table');
const directOrderId = params.get('order'); // deep-link back into an in-flight order (E15)

const state = {
  restaurant: null,
  table: null,
  menu: [],
  cart: {},          // { menu_id: { quantity, note } }
  cartOpen: false,
  submitting: false,
  order: null,       // current tracking order
  idempotencyKey: null,
  wsMode: 'live',     // 'live' | 'polling' — surfaced in UI so the fallback (E16) is visible
};

function money(n) { return '฿' + Number(n).toLocaleString('th-TH'); }
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- offline banner (E4) ----
function syncOfflineBanner() {
  document.getElementById('offline-banner').classList.toggle('hidden', navigator.onLine);
}
window.addEventListener('online', syncOfflineBanner);
window.addEventListener('offline', syncOfflineBanner);
syncOfflineBanner();

/* -------------------------------------------------------------------------
 * SCREEN: full-page error (used for E2 table not found, E3 inactive,
 * E25 restaurant not found — friendly page, never a raw 404)
 * ---------------------------------------------------------------------- */
function renderError(icon, title, message) {
  app.innerHTML = `
    <div class="min-h-screen flex flex-col items-center justify-center px-8 text-center fade-in">
      <div class="w-20 h-20 rounded-full bg-navy-900/5 flex items-center justify-center text-4xl mb-6">${icon}</div>
      <h1 class="font-display font-semibold text-xl text-navy-900 mb-2">${escapeHtml(title)}</h1>
      <p class="text-slate-500 text-sm leading-relaxed">${escapeHtml(message)}</p>
    </div>`;
}

function renderMissingQr() {
  // Dev convenience only — a real QR always carries restaurant_id + table.
  app.innerHTML = `
    <div class="min-h-screen flex flex-col items-center justify-center px-8 text-center fade-in">
      <div class="w-14 h-14 rounded-2xl bg-navy-900 flex items-center justify-center text-flamingo-400 font-display font-bold text-lg mb-6">A</div>
      <h1 class="font-display font-semibold text-lg text-navy-900 mb-2">ลิงก์นี้ไม่มีข้อมูลโต๊ะ</h1>
      <p class="text-slate-500 text-sm mb-6">โหมดทดสอบ — เลือกโต๊ะจำลองเพื่อดูหน้าเมนู</p>
      <div class="grid grid-cols-4 gap-2">
        ${[1,2,3,4].map(n => `<a href="?restaurant_id=rest_001&table=0${n}" class="py-3 rounded-xl bg-white border border-navy-900/10 shadow-card text-sm font-medium text-navy-900">โต๊ะ 0${n}</a>`).join('')}
      </div>
    </div>`;
}

/* -------------------------------------------------------------------------
 * SCREEN: menu
 * ---------------------------------------------------------------------- */
function renderMenu() {
  const categories = [...new Set(state.menu.map(m => m.category || 'เมนู'))];
  const cartCount = Object.values(state.cart).reduce((n, c) => n + c.quantity, 0);
  const cartTotal = Object.entries(state.cart).reduce((sum, [id, c]) => {
    const item = state.menu.find(m => m.id === id);
    return sum + (item ? item.price * c.quantity : 0);
  }, 0);

  app.innerHTML = `
    <header class="bg-navy-900 text-white px-5 pt-7 pb-6 rounded-b-3xl">
      <p class="text-flamingo-300 text-xs font-semibold tracking-wide uppercase mb-1">โต๊ะ ${escapeHtml(state.table.table_number)}</p>
      <h1 class="font-display font-semibold text-2xl">${escapeHtml(state.restaurant.name)}</h1>
      <p class="text-white/50 text-xs mt-1">เมนูอัปเดตล่าสุด • สแกนใหม่เพื่อรีเฟรชราคา</p>
    </header>

    ${state.menu.length === 0 ? `
      <div class="text-center px-8 py-20 fade-in">
        <p class="text-4xl mb-3">🍽️</p>
        <p class="text-navy-900 font-medium mb-1">ร้านยังไม่ได้เพิ่มเมนู</p>
        <p class="text-slate-500 text-sm">กรุณาแจ้งพนักงาน</p>
      </div>` : categories.map(cat => `
      <section class="px-5 mt-6">
        <h2 class="font-display font-semibold text-sm text-navy-900/70 uppercase tracking-wide mb-3">${escapeHtml(cat)}</h2>
        <div class="space-y-3">
          ${state.menu.filter(m => (m.category || 'เมนู') === cat).map(renderMenuCard).join('')}
        </div>
      </section>`).join('')
    }

    <div class="h-6"></div>

    ${cartCount > 0 ? `
    <button id="open-cart" class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[calc(100%-2.5rem)] max-w-md bg-flamingo-500 text-white rounded-2xl shadow-float px-5 py-4 flex items-center justify-between font-medium fade-in">
      <span class="flex items-center gap-2">
        <span class="bg-white/25 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">${cartCount}</span>
        ดูตะกร้า
      </span>
      <span class="font-display font-semibold">${money(cartTotal)}</span>
    </button>` : ''}
  `;

  document.getElementById('open-cart')?.addEventListener('click', () => { state.cartOpen = true; renderCartDrawer(); });
  state.menu.forEach(m => {
    document.getElementById('qty-plus-' + m.id)?.addEventListener('click', () => changeQty(m.id, +1));
    document.getElementById('qty-minus-' + m.id)?.addEventListener('click', () => changeQty(m.id, -1));
    document.getElementById('note-' + m.id)?.addEventListener('input', (e) => {
      state.cart[m.id] = state.cart[m.id] || { quantity: 1, note: '' };
      state.cart[m.id].note = e.target.value.slice(0, 200); // E14 cap
      document.getElementById('note-count-' + m.id).textContent = state.cart[m.id].note.length + '/200';
    });
  });
}

function renderMenuCard(m) {
  const inCart = state.cart[m.id];
  const qty = inCart ? inCart.quantity : 0;
  const unavailable = !m.available; // E7
  return `
    <div class="bg-white rounded-2xl shadow-card p-3 flex gap-3 ${unavailable ? 'opacity-50' : ''}">
      <div class="w-20 h-20 rounded-xl menu-img flex-shrink-0 flex items-center justify-center text-2xl overflow-hidden">
        ${m.image_url ? `<img src="${m.image_url}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='🍲'">` : '🍲'}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <p class="font-medium text-navy-900 text-sm leading-snug">${escapeHtml(m.name)}</p>
          ${unavailable ? '<span class="flex-shrink-0 text-[10px] font-semibold bg-navy-900/10 text-navy-900/70 px-2 py-0.5 rounded-full">หมด</span>' : ''}
        </div>
        <p class="text-slate-400 text-xs mt-0.5 line-clamp-2">${escapeHtml(m.description || '')}</p>
        <div class="flex items-center justify-between mt-2">
          <p class="font-display font-semibold text-navy-900 text-sm">${money(m.price)}</p>
          ${unavailable ? `
            <button disabled class="w-8 h-8 rounded-full bg-navy-900/10 text-navy-900/30 text-lg leading-none">+</button>
          ` : qty === 0 ? `
            <button id="qty-plus-${m.id}" class="w-8 h-8 rounded-full bg-flamingo-500 text-white text-lg leading-none active:scale-95 transition">+</button>
          ` : `
            <div class="flex items-center gap-2">
              <button id="qty-minus-${m.id}" class="w-8 h-8 rounded-full bg-navy-900/10 text-navy-900 text-lg leading-none">−</button>
              <span class="w-4 text-center text-sm font-semibold">${qty}</span>
              <button id="qty-plus-${m.id}" class="w-8 h-8 rounded-full bg-flamingo-500 text-white text-lg leading-none active:scale-95 transition">+</button>
            </div>`}
        </div>
        ${qty > 0 ? `
          <div class="mt-2">
            <textarea id="note-${m.id}" rows="1" maxlength="200" placeholder="โน้ตถึงร้าน เช่น ไม่ใส่ผัก"
              class="w-full text-xs bg-paper rounded-lg px-2 py-1.5 border border-navy-900/5 focus:outline-none focus:ring-1 focus:ring-flamingo-400 resize-none">${escapeHtml(inCart.note || '')}</textarea>
            <p id="note-count-${m.id}" class="text-[10px] text-slate-400 text-right mt-0.5">${(inCart.note||'').length}/200</p>
          </div>` : ''}
      </div>
    </div>`;
}

function changeQty(menuId, delta) {
  const current = state.cart[menuId] || { quantity: 0, note: '' };
  const next = Math.max(0, current.quantity + delta);
  if (next === 0) delete state.cart[menuId];
  else state.cart[menuId] = { ...current, quantity: next };
  state.idempotencyKey = null; // cart changed -> any previous submit attempt is void
  if (state.cartOpen) renderCartDrawer(); else renderMenu();
}

/* -------------------------------------------------------------------------
 * SCREEN: cart drawer  (AC-3.1, AC-3.2, AC-3.3, AC-3.4, AC-3.6)
 * ---------------------------------------------------------------------- */
function renderCartDrawer(conflictInfo) {
  const entries = Object.entries(state.cart);
  const total = entries.reduce((sum, [id, c]) => sum + (state.menu.find(m => m.id === id)?.price || 0) * c.quantity, 0);
  const empty = entries.length === 0; // AC-3.1 / E9

  const existing = document.getElementById('cart-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'cart-overlay';
  overlay.className = 'fixed inset-0 z-40';
  overlay.innerHTML = `
    <div class="absolute inset-0 bg-navy-900/40" id="cart-backdrop"></div>
    <div id="cart-panel" class="drawer-enter absolute bottom-0 inset-x-0 max-w-md mx-auto bg-white rounded-t-3xl shadow-float max-h-[85vh] flex flex-col">
      <div class="w-10 h-1 bg-navy-900/15 rounded-full mx-auto mt-3"></div>
      <div class="px-5 pt-4 pb-2 flex items-center justify-between">
        <h2 class="font-display font-semibold text-lg text-navy-900">ตะกร้าของคุณ</h2>
        <button id="cart-close" class="text-slate-400 text-sm">ปิด</button>
      </div>

      ${conflictInfo ? `
        <div class="mx-5 mb-2 bg-flamingo-100 border border-flamingo-300 rounded-xl px-4 py-3 text-sm text-navy-900">
          <p class="font-semibold mb-1">⚠️ มีเมนูเพิ่งหมด</p>
          <p class="text-xs text-navy-900/70">${escapeHtml(conflictInfo)} — ลบออกจากตะกร้าแล้วสั่งรายการที่เหลือได้เลย</p>
        </div>` : ''}

      <div class="flex-1 overflow-y-auto px-5 space-y-3 pb-3">
        ${empty ? `<p class="text-center text-slate-400 text-sm py-10">ยังไม่ได้เลือกเมนู</p>` :
          entries.map(([id, c]) => {
            const m = state.menu.find(x => x.id === id);
            return `
            <div class="flex gap-3 items-start border-b border-navy-900/5 pb-3">
              <div class="flex-1">
                <p class="text-sm font-medium text-navy-900">${escapeHtml(m.name)}</p>
                ${c.note ? `<p class="text-xs text-slate-400 mt-0.5">โน้ต: ${escapeHtml(c.note)}</p>` : ''}
                <p class="text-xs text-slate-400 mt-0.5">${money(m.price)} x ${c.quantity}</p>
              </div>
              <div class="flex items-center gap-2">
                <button data-minus="${id}" class="w-7 h-7 rounded-full bg-navy-900/10 text-sm">−</button>
                <span class="text-sm w-4 text-center">${c.quantity}</span>
                <button data-plus="${id}" class="w-7 h-7 rounded-full bg-flamingo-500 text-white text-sm">+</button>
              </div>
            </div>`;
          }).join('')}
      </div>

      <div class="px-5 py-4 border-t border-navy-900/5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-slate-500 text-sm">ยอดรวม</span>
          <span class="font-display font-semibold text-xl text-navy-900">${money(total)}</span>
        </div>
        <button id="place-order" ${empty || state.submitting ? 'disabled' : ''}
          class="w-full py-4 rounded-2xl font-semibold text-white transition ${empty ? 'bg-navy-900/15 cursor-not-allowed' : 'bg-flamingo-500 active:scale-[0.98]'}">
          ${state.submitting ? 'กำลังส่งออเดอร์...' : 'ยืนยันสั่งอาหาร'}
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => document.getElementById('cart-panel').classList.add('drawer-open'));

  const close = () => { state.cartOpen = false; overlay.remove(); renderMenu(); };
  document.getElementById('cart-backdrop').addEventListener('click', close);
  document.getElementById('cart-close').addEventListener('click', close);
  overlay.querySelectorAll('[data-plus]').forEach(b => b.addEventListener('click', () => changeQty(b.dataset.plus, +1)));
  overlay.querySelectorAll('[data-minus]').forEach(b => b.addEventListener('click', () => changeQty(b.dataset.minus, -1)));
  document.getElementById('place-order')?.addEventListener('click', submitOrder);
}

/* -------------------------------------------------------------------------
 * SUBMIT ORDER  (AC-3.3 confirm <2s, AC-3.4 no dupes, AC-3.5 conflict recovery,
 * E12 retry-on-failure, E13 quantity validation client-side before send)
 * ---------------------------------------------------------------------- */
async function submitOrder() {
  if (state.submitting) return; // guards double-tap on top of the disabled attribute (E11)
  const items = Object.entries(state.cart).map(([menu_id, c]) => ({ menu_id, quantity: c.quantity, note: c.note || '' }));
  if (items.some(i => i.quantity <= 0)) return; // client-side guard (E13) — server re-validates too

  state.submitting = true;
  if (!state.idempotencyKey) state.idempotencyKey = ARIN_UTIL.uid('idem'); // same key survives retries (E11)
  renderCartDrawer();

  const attempt = async (retriesLeft) => {
    // PRODUCTION: POST https://api.arinworks.co/v1/orders  { restaurant_id, table_id, items }
    // with header Idempotency-Key: <state.idempotencyKey>
    const res = await ARIN_DB.createOrder({
      restaurant_id: state.restaurant.id,
      table_id: state.table.id,
      items,
      idempotency_key: state.idempotencyKey,
    });

    if (!navigator.onLine && retriesLeft > 0) { // E12: retry automatically while offline, then surface a manual retry
      setTimeout(() => attempt(retriesLeft - 1), 1200);
      return;
    }

    if (!res.success) {
      state.submitting = false;
      if (res.error.code === 'MENU_ITEM_UNAVAILABLE') {
        // AC-3.5 / E10: tell them exactly what's gone, let them drop it and keep the rest
        const badId = Object.keys(state.cart).find(id => !state.menu.find(m => m.id === id)?.available);
        const badName = state.menu.find(m => m.id === badId)?.name || res.error.message;
        if (badId) delete state.cart[badId];
        state.idempotencyKey = null;
        renderCartDrawer(badName);
        return;
      }
      renderCartDrawer('ส่งไม่สำเร็จ: ' + res.error.message + ' — กดยืนยันอีกครั้ง');
      return;
    }

    // success
    state.order = res.data;
    state.cart = {};
    localStorage.setItem('arin_last_order_' + state.restaurant.id + '_' + state.table.table_number, res.data.order_id);
    document.getElementById('cart-overlay')?.remove();
    renderTracking();
  };

  attempt(3);
}

/* -------------------------------------------------------------------------
 * SCREEN: order tracking  (AC-4.1 live update <2s, AC-4.2 polling fallback,
 * AC-4.3 resume via order_id, E15, E16)
 * ---------------------------------------------------------------------- */
const STEP_LABEL = { pending: 'รับออเดอร์แล้ว', accepted: 'ร้านรับออเดอร์', preparing: 'กำลังปรุง', ready: 'พร้อมเสิร์ฟ', completed: 'เสร็จสิ้น' };

function renderTracking() {
  const order = state.order;
  const steps = ARIN_UTIL.STATUS_ORDER;
  const currentIdx = steps.indexOf(order.status);

  app.innerHTML = `
    <header class="bg-navy-900 text-white px-5 pt-7 pb-8 rounded-b-3xl">
      <div class="flex items-center justify-between mb-1">
        <p class="text-flamingo-300 text-xs font-semibold tracking-wide uppercase">ออเดอร์ #${order.order_id.slice(-6)}</p>
        <span id="ws-badge" class="text-[10px] px-2 py-0.5 rounded-full ${state.wsMode==='live' ? 'bg-flamingo-500/20 text-flamingo-300' : 'bg-white/10 text-white/60'}">
          ${state.wsMode === 'live' ? '● เรียลไทม์' : '↻ อัปเดตทุก 5 วิ'}
        </span>
      </div>
      <h1 class="font-display font-semibold text-2xl">${STEP_LABEL[order.status]}</h1>
      <p class="text-white/50 text-xs mt-1">โต๊ะ ${escapeHtml(state.table.table_number)} • ${escapeHtml(state.restaurant.name)}</p>
    </header>

    <div class="px-6 mt-8">
      <div class="flex items-center">
        ${steps.map((s, i) => `
          <div class="flex items-center ${i < steps.length - 1 ? 'flex-1' : ''}">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0
              ${i <= currentIdx ? 'bg-flamingo-500 text-white' : 'bg-navy-900/10 text-navy-900/30'}
              ${i === currentIdx ? 'pulse-dot' : ''}">
              ${i < currentIdx ? '✓' : i + 1}
            </div>
            ${i < steps.length - 1 ? `<div class="flex-1 h-0.5 mx-1 ${i < currentIdx ? 'bg-flamingo-500' : 'bg-navy-900/10'}"></div>` : ''}
          </div>`).join('')}
      </div>
      <div class="flex justify-between mt-2">
        ${steps.map((s, i) => `<span class="text-[10px] w-8 text-center -ml-4 first:ml-0 ${i<=currentIdx?'text-navy-900 font-medium':'text-slate-400'}">${STEP_LABEL[s]}</span>`).join('')}
      </div>
    </div>

    <div class="mx-5 mt-8 bg-white rounded-2xl shadow-card p-4">
      <h2 class="font-display font-semibold text-sm text-navy-900 mb-3">รายการอาหาร</h2>
      <div class="space-y-2">
        ${order.items.map(it => `
          <div class="flex justify-between text-sm">
            <span class="text-navy-900/80">${it.quantity}x ${escapeHtml(it.menu_item_name)}</span>
            <span class="text-navy-900 font-medium">${money(it.unit_price * it.quantity)}</span>
          </div>
          ${it.note ? `<p class="text-xs text-slate-400 pl-1">— ${escapeHtml(it.note)}</p>` : ''}
        `).join('')}
      </div>
      <div class="flex justify-between mt-3 pt-3 border-t border-navy-900/5">
        <span class="font-medium text-navy-900">ยอดรวม</span>
        <span class="font-display font-semibold text-navy-900">${money(order.total)}</span>
      </div>
    </div>

    <p class="text-center text-slate-400 text-xs mt-6 px-8">หน้านี้อัปเดตสถานะอัตโนมัติ — ปิดแอปหรือสลับหน้าจอได้ กลับมาแล้วยังเห็นสถานะล่าสุด</p>
  `;
}

let pollTimer = null;
function startTrackingSync(orderId) {
  // PRODUCTION: open WSS /ws/orders/{order_id}; on close/error fall back to the
  // polling interval below (API spec §6.2, AC-4.2, E16).
  const unsubscribe = ARIN_REALTIME.subscribeOrder(orderId, ({ data }) => {
    if (state.order && data.status && state.order.order_id === orderId) {
      state.order.status = data.status;
      renderTracking();
    }
  });

  // Polling fallback — always running underneath in this demo so status
  // never goes stale even if the realtime channel silently drops.
  pollTimer = setInterval(async () => {
    const res = await ARIN_DB.getOrder(orderId);
    if (res.success && state.order && res.data.status !== state.order.status) {
      state.order = res.data;
      renderTracking();
    }
  }, 5000);

  window.addEventListener('beforeunload', () => { unsubscribe(); clearInterval(pollTimer); });
}

/* -------------------------------------------------------------------------
 * BOOT
 * ---------------------------------------------------------------------- */
async function boot() {
  if (!restaurantId || !tableNumber) { renderMissingQr(); return; }

  const res = await ARIN_DB.getRestaurantMenu(restaurantId, tableNumber);
  if (!res.success) {
    const icon = res.error.code === 'TABLE_NOT_FOUND' ? '📍' : res.error.code === 'RESTAURANT_INACTIVE' ? '🌙' : '❓';
    const title = res.error.code === 'TABLE_NOT_FOUND' ? 'ไม่พบโต๊ะนี้' : res.error.code === 'RESTAURANT_INACTIVE' ? 'ร้านปิดรับออเดอร์ชั่วคราว' : 'ไม่พบร้านนี้';
    renderError(icon, title, res.error.message + (res.error.code === 'TABLE_NOT_FOUND' ? ' กรุณาแจ้งพนักงาน' : ''));
    return;
  }

  state.restaurant = res.data.restaurant;
  state.table = res.data.table;
  state.menu = res.data.menu;

  // AC-4.3 / E15: resume an in-flight order instead of dropping back to an empty menu
  const resumeId = directOrderId || localStorage.getItem('arin_last_order_' + state.restaurant.id + '_' + state.table.table_number);
  if (resumeId) {
    const orderRes = await ARIN_DB.getOrder(resumeId);
    if (orderRes.success && orderRes.data.status !== 'completed') {
      state.order = orderRes.data;
      renderTracking();
      startTrackingSync(resumeId);
      return;
    }
  }

  renderMenu();
}

boot();
</script>
