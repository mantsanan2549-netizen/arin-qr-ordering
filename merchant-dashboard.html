<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARIN Merchant Dashboard — ครัวคุณยาย</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0A1830', 800: '#0F2038', 700: '#16304F', 600: '#1E3E63' },
          flamingo: { 500: '#FF5C8D', 400: '#FF7FA3', 300: '#FFA8C1', 100: '#FFE3EC' },
          paper: '#F7F8FA',
          ink: '#1A2233',
          slate: { 500: '#6B7686', 400: '#8B94A3' },
        },
        fontFamily: {
          display: ['"IBM Plex Sans Thai"', '"Inter"', 'sans-serif'],
          body: ['"IBM Plex Sans Thai"', '"Inter"', 'sans-serif'],
        },
        boxShadow: {
          card: '0 2px 14px rgba(10,24,48,0.06)',
          float: '0 8px 30px rgba(10,24,48,0.18)',
        },
      },
    },
  };
</script>
<style>
  * { font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif; }
  body { background: #F7F8FA; }
  .fade-in { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:none; } }
  .card-in { animation: cardIn .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes cardIn { from { opacity:0; transform: translateY(-10px) scale(.98); } to { opacity:1; transform:none; } }
  .ring-pulse { animation: ringPulse 1.8s ease-out infinite; }
  @keyframes ringPulse { 0%{box-shadow:0 0 0 0 rgba(255,92,141,.45);} 100%{box-shadow:0 0 0 10px rgba(255,92,141,0);} }
</style>
</head>
<body class="text-ink antialiased min-h-screen">

<div id="app" class="min-h-screen"></div>

<!-- inline "ding" sound for new orders (E21) — tiny base64 beep, no external asset needed -->
<audio id="ding-sound" preload="auto">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
</audio>

<!-- arin-core.js เชื่อมต่อ Supabase จริง ต้องโหลด SDK นี้มาก่อนเสมอ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="arin-core.js"></script>
<script>
/* =========================================================================
 * ARIN QR ORDERING — MERCHANT DASHBOARD
 * Screens: login -> dashboard (active orders, realtime push, status control)
 * ========================================================================= */

const app = document.getElementById('app');
const state = {
  session: ARIN_DB.getSession(),
  orders: [],
  detailOrderId: null,
  lastSoundAt: 0,
};

function money(n) { return '฿' + Number(n).toLocaleString('th-TH'); }
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'เมื่อครู่';
  if (s < 3600) return Math.floor(s / 60) + ' นาทีที่แล้ว';
  return Math.floor(s / 3600) + ' ชม.ที่แล้ว';
}

const STATUS_LABEL = { pending: 'รอรับออเดอร์', accepted: 'รับออเดอร์แล้ว', preparing: 'กำลังปรุง', ready: 'พร้อมเสิร์ฟ', completed: 'เสร็จสิ้น' };
const STATUS_COLOR = { pending: 'bg-flamingo-500', accepted: 'bg-navy-600', preparing: 'bg-amber-500', ready: 'bg-emerald-500' };
const NEXT_STATUS = { pending: 'accepted', accepted: 'preparing', preparing: 'ready', ready: 'completed' };
const NEXT_LABEL = { pending: 'รับออเดอร์', accepted: 'เริ่มปรุง', preparing: 'พร้อมเสิร์ฟแล้ว', ready: 'ส่งมอบแล้ว' };

/* -------------------------------------------------------------------------
 * SCREEN: login
 * ---------------------------------------------------------------------- */
function renderLogin(errorMsg) {
  app.innerHTML = `
    <div class="min-h-screen flex items-center justify-center px-6 bg-navy-900">
      <div class="w-full max-w-sm fade-in">
        <div class="w-12 h-12 rounded-2xl bg-flamingo-500 flex items-center justify-center font-display font-bold text-white text-lg mb-6">A</div>
        <h1 class="font-display font-semibold text-2xl text-white mb-1">เข้าสู่ระบบร้านค้า</h1>
        <p class="text-white/40 text-sm mb-8">ARIN QR Ordering — Merchant Dashboard</p>

        ${errorMsg ? `<div class="bg-flamingo-500/10 border border-flamingo-500/30 text-flamingo-300 text-sm rounded-xl px-4 py-3 mb-4">${escapeHtml(errorMsg)}</div>` : ''}

        <div class="space-y-3">
          <input id="login-email" type="email" placeholder="อีเมล" value="demo@arin.co"
            class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-flamingo-400">
          <input id="login-password" type="password" placeholder="รหัสผ่าน" value="demo1234"
            class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-flamingo-400">
          <button id="login-btn" class="w-full py-3.5 rounded-xl bg-flamingo-500 text-white font-semibold active:scale-[0.98] transition">เข้าสู่ระบบ</button>
        </div>
        <p class="text-white/30 text-xs mt-5">โหมดทดสอบ (เจ้าของร้าน): demo@arin.co / demo1234</p>
        <p class="text-white/30 text-xs">โหมดทดสอบ (พนักงาน): staff@arin.co / staff1234</p>
      </div>
    </div>`;

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    // PRODUCTION: POST https://api.arinworks.co/v1/auth/login
    const res = await ARIN_DB.merchantLogin(email, password);
    if (!res.success) { renderLogin(res.error.message); return; }
    state.session = ARIN_DB.getSession();
    scheduleTokenRefresh();
    renderDashboard();
    startRealtime();
  });
}

/* -------------------------------------------------------------------------
 * AC-6.2 / E19: silent-refresh the access token before it expires so a
 * merchant is never kicked out mid-service.
 * ---------------------------------------------------------------------- */
let refreshTimer = null;
function scheduleTokenRefresh() {
  clearTimeout(refreshTimer);
  // real token = 1hr; refresh 5 min before expiry. Demo uses a shorter loop just to prove the mechanism exists.
  const refreshInMs = (state.session.expires_in - 300) * 1000;
  refreshTimer = setTimeout(async () => {
    const res = await ARIN_DB.refreshToken(state.session.refresh_token);
    if (res.success) {
      state.session = ARIN_DB.getSession();
      scheduleTokenRefresh();
    } else {
      renderLogin('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
    }
  }, Math.max(refreshInMs, 5000));
}

/* -------------------------------------------------------------------------
 * SCREEN: dashboard  (AC-5.1 active orders oldest-first, AC-5.2 new order
 * alert, AC-5.3/E20 forward-only transitions, AC-5.4/E23 multi-device sync,
 * AC-5.5/E22 reload keeps active orders)
 * ---------------------------------------------------------------------- */
async function loadOrders() {
  const res = await ARIN_DB.listMerchantOrders(state.session.restaurant_id);
  state.orders = res.success ? res.data.orders : [];
}

async function renderDashboard() {
  await loadOrders();
  app.innerHTML = `
    <header class="bg-navy-900 text-white px-6 py-5 flex items-center justify-between sticky top-0 z-10">
      <div>
        <p class="text-flamingo-300 text-[11px] font-semibold tracking-wide uppercase">Merchant Dashboard</p>
        <h1 class="font-display font-semibold text-xl">ครัวคุณยาย</h1>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-[11px] text-white/40 hidden sm:block">${state.session.email} • ${state.session.role === 'owner' ? 'เจ้าของร้าน' : 'พนักงาน'}</span>
        ${state.session.role === 'owner' ? `<a href="owner-portal.html" class="text-xs bg-flamingo-500 hover:bg-flamingo-400 px-3 py-2 rounded-lg font-medium">เปิด Owner Portal</a>` : ''}
        <button id="logout-btn" class="text-xs bg-white/10 hover:bg-white/15 px-3 py-2 rounded-lg">ออกจากระบบ</button>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-display font-semibold text-navy-900">ออเดอร์ที่ต้องดำเนินการ (${state.orders.length})</h2>
        <span class="text-xs text-slate-400 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span> เชื่อมต่อเรียลไทม์
        </span>
      </div>

      <div id="order-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        ${state.orders.length === 0 ? `
          <div class="col-span-full text-center py-24 text-slate-400">
            <p class="text-4xl mb-3">🧾</p>
            <p class="text-sm">ยังไม่มีออเดอร์เข้ามา — พร้อมรับออเดอร์ใหม่ตลอดเวลา</p>
          </div>` : state.orders.map(renderOrderCard).join('')}
      </div>
    </main>
  `;

  document.getElementById('logout-btn').addEventListener('click', () => {
    ARIN_DB.logout();
    clearTimeout(refreshTimer);
    location.reload();
  });

  state.orders.forEach(o => {
    document.getElementById('advance-' + o.order_id)?.addEventListener('click', () => advanceStatus(o.order_id, o.status));
  });
}

function renderOrderCard(o) {
  const next = NEXT_STATUS[o.status];
  return `
    <div id="card-${o.order_id}" class="bg-white rounded-2xl shadow-card p-4 border-l-4 ${STATUS_COLOR[o.status] || 'border-navy-900'}" style="border-left-color: currentColor;">
      <div class="flex items-start justify-between mb-2">
        <div>
          <p class="font-display font-semibold text-navy-900">โต๊ะ ${escapeHtml(o.table_number)}</p>
          <p class="text-[11px] text-slate-400">#${o.order_id.slice(-6)} • ${timeAgo(o.created_at)}</p>
        </div>
        <span class="text-[11px] font-semibold px-2.5 py-1 rounded-full text-white ${STATUS_COLOR[o.status] || 'bg-navy-900'}">${STATUS_LABEL[o.status]}</span>
      </div>
      <div class="flex items-center justify-between text-sm mb-3">
        <span class="text-slate-500">${o.item_count} รายการ</span>
        <span class="font-display font-semibold text-navy-900">${money(o.total)}</span>
      </div>
      ${next ? `<button id="advance-${o.order_id}" class="w-full py-2.5 rounded-xl bg-navy-900 text-white text-sm font-medium active:scale-[0.98] transition">${NEXT_LABEL[o.status]} →</button>` : ''}
    </div>`;
}

/* AC-5.3 / E20: only ever request the single next step — the skip-ahead
 * button never exists in the DOM to begin with. */
async function advanceStatus(orderId, currentStatus) {
  const next = NEXT_STATUS[currentStatus];
  if (!next) return;
  // PRODUCTION: PATCH https://api.arinworks.co/v1/merchant/orders/{order_id}/status  { status: next }
  const res = await ARIN_DB.updateOrderStatus(orderId, state.session.restaurant_id, next);
  if (!res.success) { alert(res.error.message); return; }
  renderDashboard();
}

/* -------------------------------------------------------------------------
 * REALTIME  (AC-5.2 new order pops in without refresh, AC-5.4/E23 syncs
 * across devices/tabs, E21 debounced sound so a rush of orders doesn't spam)
 * ---------------------------------------------------------------------- */
function startRealtime() {
  // PRODUCTION: connect WSS /ws/merchant/{restaurant_id}; on reconnect,
  // always re-fetch GET /merchant/orders to resync (sockets push, they are
  // not the source of truth) — mirrored here by calling renderDashboard()
  // fresh on every event instead of trusting only the pushed payload.
  ARIN_REALTIME.subscribeMerchant(state.session.restaurant_id, async ({ event }) => {
    const isNew = event === 'order.created';
    await renderDashboard();
    if (isNew) {
      const flash = document.querySelector('#order-grid > div');
      flash?.classList.add('card-in', 'ring-pulse');
      playDing();
    }
  });
}

function playDing() {
  const now = Date.now();
  if (now - state.lastSoundAt < 1500) return; // debounce rapid-fire orders (E21)
  state.lastSoundAt = now;
  const audio = document.getElementById('ding-sound');
  audio.currentTime = 0;
  audio.play().catch(() => {}); // browsers may block autoplay before first user interaction — fail silently
}

/* -------------------------------------------------------------------------
 * BOOT — E22: a page reload must still show whatever is active, not just
 * orders created after the reload.
 * ---------------------------------------------------------------------- */
async function boot() {
  if (!state.session) { renderLogin(); return; }
  scheduleTokenRefresh();
  renderDashboard();
  startRealtime();
}
boot();
</script>
</body>
</html>
