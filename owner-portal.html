<script>
/* =========================================================================
 * ARIN QR ORDERING — CORE DATA / API LAYER (v2)  [inlined for standalone use]
 * ========================================================================= */
/**
 * ARIN QR ORDERING SYSTEM — CORE DATA / API LAYER (v2)
 * =====================================================
 * Doc refs: ARIN-API-QR-001 v1.0, ARIN-DB-QR-001 v1.0, ARIN-EDGE-QR-001 v1.0, ARIN-AC-QR-001 v1.0
 * + new scope (not in v1.0 docs — tracked here until formal spec docs exist):
 *     - merchant_users.role ('owner' | 'staff')
 *     - restaurant/menu/table self-service management (owner only)
 *     - QR code linking helper
 *     - platform-level Super Admin actor (separate from merchant_users entirely)
 *       with cross-restaurant sales analytics
 *
 * This file is a LOCAL, WORKING STAND-IN for the real backend. Every function
 * returns the same { success, data } / { success, error } envelope as the API
 * spec so UI code never branches on "mock vs real". See bottom of file for the
 * "PRODUCTION: ..." comments marking exactly what a real backend call replaces.
 */

(function (global) {
  'use strict';

  // ---------------------------------------------------------------------
  // 1. STORAGE KEYS (maps to ARIN-DB-QR-001 table names, plus new ones)
  // ---------------------------------------------------------------------
  const KEYS = {
    schemaVersion: 'arin_qr_schema_version',
    restaurants: 'arin_qr_restaurants',
    tables: 'arin_qr_tables',
    menuItems: 'arin_qr_menu_items',
    merchantUsers: 'arin_qr_merchant_users',
    orders: 'arin_qr_orders',
    orderItems: 'arin_qr_order_items',
    session: 'arin_qr_merchant_session',   // merchant (owner/staff) session
    adminUsers: 'arin_qr_admin_users',     // NEW: platform-level actor, not tied to any restaurant
    adminSession: 'arin_qr_admin_session', // NEW
  };
  const SCHEMA_VERSION = '2';

  function read(key, fallback) {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch (e) { return fallback; }
  }
  function write(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
  function uid(prefix) { return (prefix ? prefix + '_' : '') + Math.random().toString(36).slice(2, 10); }
  function nowIso() { return new Date().toISOString(); } // always UTC (E26) — format locally on display only
  function envelopeOk(data) { return { success: true, data, meta: { timestamp: nowIso() } }; }
  function envelopeErr(code, message) { return { success: false, error: { code, message }, meta: { timestamp: nowIso() } }; }

  // ---------------------------------------------------------------------
  // 2. SEED DATA
  //    NOTE: this is a demo/prototype data layer. Bumping SCHEMA_VERSION
  //    wipes and reseeds fresh rather than writing a real migration — fine
  //    for a local prototype, NOT the pattern to use once there's real
  //    restaurant data in a real database.
  // ---------------------------------------------------------------------
  function clearAll() { Object.values(KEYS).forEach((k) => { if (k !== KEYS.schemaVersion) localStorage.removeItem(k); }); }

  function seedMenuFor(restaurantId, defs) {
    return defs.map((m) => ({ id: uid('menu'), restaurant_id: restaurantId, image_url: '', created_at: nowIso(), updated_at: nowIso(), ...m }));
  }

  function seed() {
    if (read(KEYS.schemaVersion, null) === SCHEMA_VERSION) return; // already on current schema
    clearAll();

    // ---- Restaurant 1 ----
    const r1 = 'rest_001';
    // ---- Restaurant 2 (so Super Admin has more than one restaurant to compare) ----
    const r2 = 'rest_002';

    write(KEYS.restaurants, [
      { id: r1, name: 'ครัวคุณยาย', phone: '043-000-000', logo_url: '', is_active: true, created_at: nowIso(), updated_at: nowIso() },
      { id: r2, name: 'ก๋วยเตี๋ยวเรือลุงมานี', phone: '043-111-111', logo_url: '', is_active: true, created_at: nowIso(), updated_at: nowIso() },
    ]);

    const tables1 = Array.from({ length: 8 }, (_, i) => ({ id: uid('table'), restaurant_id: r1, table_number: String(i + 1).padStart(2, '0'), qr_code_url: '', created_at: nowIso() }));
    const tables2 = Array.from({ length: 6 }, (_, i) => ({ id: uid('table'), restaurant_id: r2, table_number: String(i + 1).padStart(2, '0'), qr_code_url: '', created_at: nowIso() }));
    write(KEYS.tables, [...tables1, ...tables2]);

    const menu1 = seedMenuFor(r1, [
      { name: 'ผัดไทยกุ้งสด', description: 'เส้นจันท์ผัดซอสมะขาม กุ้งแม่น้ำตัวโต', price: 89, category: 'จานหลัก', available: true },
      { name: 'ข้าวผัดกุ้ง', description: 'ข้าวหอมมะลิผัดกุ้งสด ไข่ดาวเยิ้ม', price: 79, category: 'จานหลัก', available: true },
      { name: 'ต้มยำกุ้งน้ำข้น', description: 'รสจัดจ้าน เครื่องแน่น', price: 129, category: 'จานหลัก', available: true },
      { name: 'ส้มตำไทย', description: 'เผ็ดกลาง หวานนำ', price: 59, category: 'ของทานเล่น', available: true },
      { name: 'ปีกไก่ทอดน้ำปลา', description: 'ทอดกรอบ หมักน้ำปลาโบราณ', price: 69, category: 'ของทานเล่น', available: false },
      { name: 'ชาไทยเย็น', description: 'ชงเข้ม หวานมัน', price: 39, category: 'เครื่องดื่ม', available: true },
      { name: 'น้ำมะนาวโซดา', description: 'สดชื่น เปรี้ยวซ่า', price: 35, category: 'เครื่องดื่ม', available: true },
    ]);
    const menu2 = seedMenuFor(r2, [
      { name: 'ก๋วยเตี๋ยวเรือหมู', description: 'น้ำตกเข้มข้น เส้นเล็ก', price: 45, category: 'จานหลัก', available: true },
      { name: 'ก๋วยเตี๋ยวเรือเนื้อ', description: 'น้ำตกเข้มข้น เส้นใหญ่', price: 49, category: 'จานหลัก', available: true },
      { name: 'ลูกชิ้นปลาทอด', description: 'ทอดกรอบ จิ้มซีฟู้ด', price: 39, category: 'ของทานเล่น', available: true },
      { name: 'น้ำอัดลม', description: 'เย็นฉ่ำ', price: 20, category: 'เครื่องดื่ม', available: true },
    ]);
    write(KEYS.menuItems, [...menu1, ...menu2]);

    write(KEYS.merchantUsers, [
      { id: uid('merchant'), restaurant_id: r1, email: 'demo@arin.co', password: 'demo1234', role: 'owner', is_locked: false, created_at: nowIso(), last_login_at: null },
      { id: uid('merchant'), restaurant_id: r1, email: 'staff@arin.co', password: 'staff1234', role: 'staff', is_locked: false, created_at: nowIso(), last_login_at: null },
      { id: uid('merchant'), restaurant_id: r2, email: 'manee@arin.co', password: 'manee1234', role: 'owner', is_locked: false, created_at: nowIso(), last_login_at: null },
    ]);

    // Super Admin — platform-level, NOT scoped to any restaurant, completely separate login.
    write(KEYS.adminUsers, [
      { id: uid('admin'), email: 'admin@arin.co', password: 'arinadmin2026', name: 'ARIN Admin', created_at: nowIso() },
    ]);

    write(KEYS.orders, []);
    write(KEYS.orderItems, []);

    seedHistoricalOrders(r1, tables1, menu1, 60);
    seedHistoricalOrders(r2, tables2, menu2, 60);

    write(KEYS.schemaVersion, SCHEMA_VERSION);
  }

  // Backfills realistic-looking completed orders over the past N days so
  // Super Admin charts (day/week/month/year) have something to show
  // immediately instead of an empty graph on first load.
  function seedHistoricalOrders(restaurantId, tables, menuItems, days) {
    const orders = read(KEYS.orders, []);
    const orderItems = read(KEYS.orderItems, []);
    const availableMenu = menuItems.filter((m) => m.available !== false || true); // include all for variety
    const today = new Date();

    for (let d = days; d >= 0; d--) {
      const day = new Date(today); day.setDate(today.getDate() - d);
      const isWeekend = [0, 6].includes(day.getDay());
      const isToday = d === 0;
      const currentHour = today.getHours();
      if (isToday && currentHour < 10) continue; // restaurant not "open" yet today — skip rather than fake future orders
      const ordersToday = Math.floor((isWeekend ? 10 : 6) + Math.random() * (isWeekend ? 10 : 8)) * (isToday ? 0.5 : 1);
      for (let n = 0; n < ordersToday; n++) {
        const table = tables[Math.floor(Math.random() * tables.length)];
        const itemCount = 1 + Math.floor(Math.random() * 3);
        const pickedIds = new Set();
        let total = 0;
        const items = [];
        for (let k = 0; k < itemCount; k++) {
          const m = availableMenu[Math.floor(Math.random() * availableMenu.length)];
          if (pickedIds.has(m.id)) continue;
          pickedIds.add(m.id);
          const qty = 1 + Math.floor(Math.random() * 3);
          total += m.price * qty;
          items.push({ id: uid('oi'), menu_item_id: m.id, menu_item_name: m.name, unit_price: m.price, quantity: qty, note: '' });
        }
        if (items.length === 0) continue;
        const hour = isToday ? 10 + Math.floor(Math.random() * Math.max(1, currentHour - 10)) : 10 + Math.floor(Math.random() * 11); // 10:00–21:00 service window
        const createdAt = new Date(day); createdAt.setHours(hour, Math.floor(Math.random() * 60), 0, 0);
        const order = {
          id: uid('ord'), restaurant_id: restaurantId, table_id: table.id, status: 'completed',
          total, idempotency_key: uid('idem'), created_at: createdAt.toISOString(), updated_at: createdAt.toISOString(),
        };
        orders.push(order);
        items.forEach((it) => orderItems.push({ ...it, order_id: order.id }));
      }
    }
    write(KEYS.orders, orders);
    write(KEYS.orderItems, orderItems);
  }

  // ---------------------------------------------------------------------
  // 3. REALTIME LAYER — BroadcastChannel stands in for Supabase Realtime /
  //    the WSS endpoints in API spec §6. See README for production notes.
  // ---------------------------------------------------------------------
  const bc = ('BroadcastChannel' in window) ? new BroadcastChannel('arin-qr-system') : null;
  const listeners = { merchant: {}, order: {} };
  if (bc) {
    bc.onmessage = (ev) => {
      const { event, restaurant_id, order_id, data } = ev.data || {};
      if (event === 'order.created' || event === 'order.updated') {
        (listeners.merchant[restaurant_id] || []).forEach((cb) => cb({ event, data }));
        (listeners.order[order_id] || []).forEach((cb) => cb({ event, data }));
      }
    };
  }
  const ARIN_REALTIME = {
    subscribeMerchant(restaurantId, cb) {
      listeners.merchant[restaurantId] = listeners.merchant[restaurantId] || [];
      listeners.merchant[restaurantId].push(cb);
      return () => { listeners.merchant[restaurantId] = (listeners.merchant[restaurantId] || []).filter((f) => f !== cb); };
    },
    subscribeOrder(orderId, cb) {
      listeners.order[orderId] = listeners.order[orderId] || [];
      listeners.order[orderId].push(cb);
      return () => { listeners.order[orderId] = (listeners.order[orderId] || []).filter((f) => f !== cb); };
    },
    _emit(event, payload) {
      if (bc) bc.postMessage({ event, ...payload });
      if (payload.restaurant_id) (listeners.merchant[payload.restaurant_id] || []).forEach((cb) => cb({ event, data: payload.data }));
      if (payload.order_id) (listeners.order[payload.order_id] || []).forEach((cb) => cb({ event, data: payload.data }));
    },
  };

  // ---------------------------------------------------------------------
  // 4. DATE BUCKETING HELPERS (for Super Admin analytics — day/week/month/year)
  // ---------------------------------------------------------------------
  const THAI_MONTHS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
  function startOfDay(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
  function startOfWeek(d) { const x = startOfDay(d); const day = (x.getDay() + 6) % 7; x.setDate(x.getDate() - day); return x; } // Monday start
  function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
  function startOfYear(d) { return new Date(d.getFullYear(), 0, 1); }
  function stepDate(d, period, delta) {
    const x = new Date(d);
    if (period === 'day') x.setDate(x.getDate() + delta);
    else if (period === 'week') x.setDate(x.getDate() + delta * 7);
    else if (period === 'month') x.setMonth(x.getMonth() + delta);
    else if (period === 'year') x.setFullYear(x.getFullYear() + delta);
    return x;
  }
  function bucketConfig(period) {
    const table = {
      day: { count: 14, startFn: startOfDay, label: (d) => `${d.getDate()}/${d.getMonth() + 1}` },
      week: { count: 10, startFn: startOfWeek, label: (d) => `${d.getDate()}/${d.getMonth() + 1}` },
      month: { count: 12, startFn: startOfMonth, label: (d) => `${THAI_MONTHS[d.getMonth()]} ${d.getFullYear()}` },
      year: { count: 5, startFn: startOfYear, label: (d) => `${d.getFullYear()}` },
    };
    return table[period] || table.day;
  }
  function buildBuckets(period) {
    const cfg = bucketConfig(period);
    const now = new Date();
    const currentStart = cfg.startFn(now);
    const starts = [];
    for (let i = cfg.count - 1; i >= 0; i--) starts.push(stepDate(currentStart, period, -i));
    return starts.map((start, i) => ({
      start,
      end: i + 1 < starts.length ? starts[i + 1] : stepDate(start, period, 1),
      label: cfg.label(start),
    }));
  }

  // ---------------------------------------------------------------------
  // 5. API FUNCTIONS
  // ---------------------------------------------------------------------
  const STATUS_ORDER = ['pending', 'accepted', 'preparing', 'ready', 'completed'];

  function hydrateOrder(order) {
    const items = read(KEYS.orderItems, []).filter((i) => i.order_id === order.id);
    return { ...order, order_id: order.id, items };
  }

  const ARIN_DB = {
    // ---- Customer-facing (unchanged from v1) ----
    getRestaurantMenu(restaurantId, tableNumber) {
      const restaurant = read(KEYS.restaurants, []).find((r) => r.id === restaurantId);
      if (!restaurant) return envelopeErr('RESTAURANT_NOT_FOUND', 'ไม่พบร้านนี้ในระบบ');
      if (!restaurant.is_active) return envelopeErr('RESTAURANT_INACTIVE', 'ร้านปิดรับออเดอร์ชั่วคราว');
      const table = read(KEYS.tables, []).find((t) => t.restaurant_id === restaurantId && t.table_number === tableNumber);
      if (!table) return envelopeErr('TABLE_NOT_FOUND', 'ไม่พบโต๊ะนี้ กรุณาแจ้งพนักงาน');
      const menu = read(KEYS.menuItems, []).filter((m) => m.restaurant_id === restaurantId);
      return envelopeOk({ restaurant: { id: restaurant.id, name: restaurant.name, logo: restaurant.logo_url }, table: { id: table.id, table_number: table.table_number }, menu });
    },

    createOrder({ restaurant_id, table_id, items, idempotency_key }) {
      const restaurant = read(KEYS.restaurants, []).find((r) => r.id === restaurant_id);
      if (!restaurant || !restaurant.is_active) return envelopeErr('RESTAURANT_INACTIVE', 'ร้านปิดรับออเดอร์');
      const table = read(KEYS.tables, []).find((t) => t.id === table_id);
      if (!table) return envelopeErr('TABLE_NOT_FOUND', 'table_id ไม่ถูกต้อง');
      if (!items || items.length === 0) return envelopeErr('EMPTY_ORDER', 'ตะกร้าว่าง');

      const orders = read(KEYS.orders, []);
      const dupe = orders.find((o) => o.idempotency_key === idempotency_key);
      if (dupe) return envelopeOk(hydrateOrder(dupe));

      const menuItems = read(KEYS.menuItems, []);
      let total = 0;
      const resolvedItems = [];
      for (const it of items) {
        if (!Number.isInteger(it.quantity) || it.quantity <= 0) return envelopeErr('INVALID_QUANTITY', 'จำนวนต้องมากกว่า 0');
        const menuItem = menuItems.find((m) => m.id === it.menu_id);
        if (!menuItem || !menuItem.available) return envelopeErr('MENU_ITEM_UNAVAILABLE', `"${menuItem ? menuItem.name : it.menu_id}" เพิ่งหมด`);
        total += menuItem.price * it.quantity;
        resolvedItems.push({ id: uid('oi'), menu_item_id: menuItem.id, menu_item_name: menuItem.name, unit_price: menuItem.price, quantity: it.quantity, note: (it.note || '').slice(0, 200) });
      }

      const order = { id: uid('ord'), restaurant_id, table_id, status: 'pending', total, idempotency_key: idempotency_key || uid('idem'), created_at: nowIso(), updated_at: nowIso() };
      write(KEYS.orders, [...orders, order]);
      write(KEYS.orderItems, [...read(KEYS.orderItems, []), ...resolvedItems.map((it) => ({ ...it, order_id: order.id }))]);

      ARIN_REALTIME._emit('order.created', { restaurant_id, data: { order_id: order.id, table_number: table.table_number, total: order.total } });
      return envelopeOk(hydrateOrder(order));
    },

    getOrder(orderId) {
      const order = read(KEYS.orders, []).find((o) => o.id === orderId);
      if (!order) return envelopeErr('ORDER_NOT_FOUND', 'ไม่พบออเดอร์นี้');
      return envelopeOk(hydrateOrder(order));
    },

    // ---- Merchant auth (now returns role) ----
    merchantLogin(email, password) {
      const user = read(KEYS.merchantUsers, []).find((u) => u.email === email);
      if (!user || user.password !== password) return envelopeErr('INVALID_CREDENTIALS', 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
      if (user.is_locked) return envelopeErr('ACCOUNT_LOCKED', 'บัญชีถูกล็อก');
      user.last_login_at = nowIso();
      write(KEYS.merchantUsers, read(KEYS.merchantUsers, []).map((u) => (u.id === user.id ? user : u)));
      const session = { access_token: uid('access'), refresh_token: uid('refresh'), restaurant_id: user.restaurant_id, email: user.email, role: user.role || 'staff', issued_at: Date.now(), expires_in: 3600 };
      write(KEYS.session, session);
      return envelopeOk({ ...session });
    },
    refreshToken(refresh_token) {
      const session = read(KEYS.session, null);
      if (!session || session.refresh_token !== refresh_token) return envelopeErr('REFRESH_TOKEN_EXPIRED', 'กรุณาเข้าสู่ระบบใหม่');
      session.access_token = uid('access'); session.issued_at = Date.now();
      write(KEYS.session, session);
      return envelopeOk({ access_token: session.access_token, expires_in: 3600 });
    },
    logout() { localStorage.removeItem(KEYS.session); },
    getSession() { return read(KEYS.session, null); },

    // ---- Merchant order console (staff + owner) ----
    listMerchantOrders(restaurantId) {
      const active = STATUS_ORDER.filter((s) => s !== 'completed');
      const orders = read(KEYS.orders, []).filter((o) => o.restaurant_id === restaurantId && active.includes(o.status)).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      const tables = read(KEYS.tables, []);
      const orderItems = read(KEYS.orderItems, []);
      return envelopeOk({ orders: orders.map((o) => ({ order_id: o.id, table_number: (tables.find((t) => t.id === o.table_id) || {}).table_number || '?', status: o.status, total: o.total, item_count: orderItems.filter((i) => i.order_id === o.id).reduce((n, i) => n + i.quantity, 0), created_at: o.created_at })) });
    },
    getMerchantOrderDetail(orderId, restaurantId) {
      const order = read(KEYS.orders, []).find((o) => o.id === orderId);
      if (!order) return envelopeErr('ORDER_NOT_FOUND', 'ไม่พบออเดอร์');
      if (order.restaurant_id !== restaurantId) return envelopeErr('FORBIDDEN', 'ออเดอร์นี้ไม่ใช่ของร้านนี้');
      return envelopeOk(hydrateOrder(order));
    },
    updateOrderStatus(orderId, restaurantId, newStatus) {
      const orders = read(KEYS.orders, []);
      const order = orders.find((o) => o.id === orderId);
      if (!order) return envelopeErr('ORDER_NOT_FOUND', 'ไม่พบออเดอร์');
      if (order.restaurant_id !== restaurantId) return envelopeErr('FORBIDDEN', 'ไม่มีสิทธิ์แก้ไขออเดอร์นี้');
      const currentIdx = STATUS_ORDER.indexOf(order.status);
      const nextIdx = STATUS_ORDER.indexOf(newStatus);
      if (nextIdx !== currentIdx + 1) return envelopeErr('INVALID_STATUS_TRANSITION', 'ไม่สามารถข้ามสถานะได้');
      order.status = newStatus; order.updated_at = nowIso();
      write(KEYS.orders, orders.map((o) => (o.id === order.id ? order : o)));
      ARIN_REALTIME._emit('order.updated', { restaurant_id: restaurantId, order_id: order.id, data: { order_id: order.id, status: newStatus } });
      return envelopeOk(hydrateOrder(order));
    },

    // =====================================================================
    // NEW — OWNER-ONLY RESTAURANT SELF-SERVICE MANAGEMENT
    // Every function below double-checks restaurant_id ownership, mirroring
    // AC-6.3's FORBIDDEN pattern, so a staff/owner token from one restaurant
    // can never read or edit another restaurant's data.
    // =====================================================================
    updateRestaurantProfile(restaurantId, patch) {
      const restaurants = read(KEYS.restaurants, []);
      const restaurant = restaurants.find((r) => r.id === restaurantId);
      if (!restaurant) return envelopeErr('RESTAURANT_NOT_FOUND', 'ไม่พบร้าน');
      const updated = { ...restaurant, ...patch, updated_at: nowIso() };
      write(KEYS.restaurants, restaurants.map((r) => (r.id === restaurantId ? updated : r)));
      return envelopeOk(updated);
    },

    listMenuItemsForOwner(restaurantId) {
      return envelopeOk({ menu: read(KEYS.menuItems, []).filter((m) => m.restaurant_id === restaurantId).sort((a, b) => (a.category || '').localeCompare(b.category || '')) });
    },
    createMenuItem(restaurantId, item) {
      if (!item.name || item.name.trim() === '') return envelopeErr('VALIDATION_ERROR', 'กรุณาใส่ชื่อเมนู');
      if (typeof item.price !== 'number' || item.price < 0) return envelopeErr('VALIDATION_ERROR', 'ราคาต้องไม่ติดลบ');
      const menuItems = read(KEYS.menuItems, []);
      const newItem = { id: uid('menu'), restaurant_id: restaurantId, name: item.name.trim(), description: item.description || '', price: item.price, category: item.category || 'เมนู', image_url: item.image_url || '', available: item.available !== false, created_at: nowIso(), updated_at: nowIso() };
      write(KEYS.menuItems, [...menuItems, newItem]);
      return envelopeOk(newItem);
    },
    updateMenuItem(menuItemId, restaurantId, patch) {
      const menuItems = read(KEYS.menuItems, []);
      const item = menuItems.find((m) => m.id === menuItemId);
      if (!item) return envelopeErr('MENU_ITEM_NOT_FOUND', 'ไม่พบเมนูนี้');
      if (item.restaurant_id !== restaurantId) return envelopeErr('FORBIDDEN', 'ไม่มีสิทธิ์แก้ไขเมนูนี้');
      if (patch.price !== undefined && (typeof patch.price !== 'number' || patch.price < 0)) return envelopeErr('VALIDATION_ERROR', 'ราคาต้องไม่ติดลบ');
      const updated = { ...item, ...patch, updated_at: nowIso() };
      write(KEYS.menuItems, menuItems.map((m) => (m.id === menuItemId ? updated : m)));
      return envelopeOk(updated);
    },
    deleteMenuItem(menuItemId, restaurantId) {
      const menuItems = read(KEYS.menuItems, []);
      const item = menuItems.find((m) => m.id === menuItemId);
      if (!item) return envelopeErr('MENU_ITEM_NOT_FOUND', 'ไม่พบเมนูนี้');
      if (item.restaurant_id !== restaurantId) return envelopeErr('FORBIDDEN', 'ไม่มีสิทธิ์ลบเมนูนี้');
      // Mirrors DB spec §7: order_items.menu_item_id is ON DELETE RESTRICT —
      // a menu item referenced by any historical order can't be hard-deleted.
      const referenced = read(KEYS.orderItems, []).some((oi) => oi.menu_item_id === menuItemId);
      if (referenced) return envelopeErr('MENU_ITEM_IN_USE', 'เมนูนี้เคยถูกสั่งแล้ว ลบไม่ได้ — ปิดการขายแทนได้');
      write(KEYS.menuItems, menuItems.filter((m) => m.id !== menuItemId));
      return envelopeOk({ deleted: true });
    },

    listTables(restaurantId) {
      return envelopeOk({ tables: read(KEYS.tables, []).filter((t) => t.restaurant_id === restaurantId).sort((a, b) => a.table_number.localeCompare(b.table_number, 'th', { numeric: true })) });
    },
    createTable(restaurantId, tableNumber) {
      const num = String(tableNumber).trim();
      if (!num) return envelopeErr('VALIDATION_ERROR', 'กรุณาใส่หมายเลขโต๊ะ');
      const tables = read(KEYS.tables, []);
      // Mirrors DB spec §3: UNIQUE (restaurant_id, table_number)
      if (tables.some((t) => t.restaurant_id === restaurantId && t.table_number === num)) return envelopeErr('TABLE_NUMBER_TAKEN', `โต๊ะ ${num} มีอยู่แล้ว`);
      const table = { id: uid('table'), restaurant_id: restaurantId, table_number: num, qr_code_url: '', created_at: nowIso() };
      write(KEYS.tables, [...tables, table]);
      return envelopeOk(table);
    },
    deleteTable(tableId, restaurantId) {
      const tables = read(KEYS.tables, []);
      const table = tables.find((t) => t.id === tableId);
      if (!table) return envelopeErr('TABLE_NOT_FOUND', 'ไม่พบโต๊ะนี้');
      if (table.restaurant_id !== restaurantId) return envelopeErr('FORBIDDEN', 'ไม่มีสิทธิ์ลบโต๊ะนี้');
      const hasActiveOrder = read(KEYS.orders, []).some((o) => o.table_id === tableId && o.status !== 'completed');
      if (hasActiveOrder) return envelopeErr('TABLE_HAS_ACTIVE_ORDER', 'โต๊ะนี้มีออเดอร์ค้างอยู่ ลบไม่ได้ตอนนี้');
      write(KEYS.tables, tables.filter((t) => t.id !== tableId));
      return envelopeOk({ deleted: true });
    },
    // Builds the URL a printed QR code should point to. `baseUrl` lets the
    // owner point it at wherever customer-app.html is actually hosted.
    buildCustomerLink(baseUrl, restaurantId, tableNumber) {
      const base = (baseUrl || 'customer-app.html').replace(/\/$/, '');
      return `${base}?restaurant_id=${encodeURIComponent(restaurantId)}&table=${encodeURIComponent(tableNumber)}`;
    },

    // =====================================================================
    // NEW — SUPER ADMIN (platform level, separate auth from merchant_users)
    // =====================================================================
    adminLogin(email, password) {
      const admin = read(KEYS.adminUsers, []).find((a) => a.email === email);
      if (!admin || admin.password !== password) return envelopeErr('INVALID_CREDENTIALS', 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
      const session = { access_token: uid('admin_access'), name: admin.name, email: admin.email, issued_at: Date.now() };
      write(KEYS.adminSession, session);
      return envelopeOk(session);
    },
    adminLogout() { localStorage.removeItem(KEYS.adminSession); },
    getAdminSession() { return read(KEYS.adminSession, null); },

    adminListRestaurants() {
      const restaurants = read(KEYS.restaurants, []);
      const orders = read(KEYS.orders, []);
      const todayStart = startOfDay(new Date());
      return envelopeOk({
        restaurants: restaurants.map((r) => {
          const rOrders = orders.filter((o) => o.restaurant_id === r.id);
          const todayOrders = rOrders.filter((o) => new Date(o.created_at) >= todayStart);
          return {
            id: r.id, name: r.name, is_active: r.is_active,
            total_orders: rOrders.length,
            total_revenue: rOrders.reduce((s, o) => s + o.total, 0),
            today_orders: todayOrders.length,
            today_revenue: todayOrders.reduce((s, o) => s + o.total, 0),
          };
        }),
      });
    },

    // restaurantId = null means "all restaurants combined"
    adminGetSalesSeries(restaurantId, period) {
      const buckets = buildBuckets(period);
      const orders = read(KEYS.orders, []).filter((o) => !restaurantId || o.restaurant_id === restaurantId);
      const series = buckets.map((b) => {
        const inBucket = orders.filter((o) => { const t = new Date(o.created_at); return t >= b.start && t < b.end; });
        return { label: b.label, revenue: inBucket.reduce((s, o) => s + o.total, 0), orders: inBucket.length };
      });
      return envelopeOk({ period, series });
    },

    adminGetMenuBreakdown(restaurantId, period) {
      const buckets = buildBuckets(period);
      const rangeStart = buckets[0].start;
      const orders = read(KEYS.orders, []).filter((o) => (!restaurantId || o.restaurant_id === restaurantId) && new Date(o.created_at) >= rangeStart);
      const orderIds = new Set(orders.map((o) => o.id));
      const items = read(KEYS.orderItems, []).filter((oi) => orderIds.has(oi.order_id));
      const byName = {};
      items.forEach((it) => {
        byName[it.menu_item_name] = byName[it.menu_item_name] || { name: it.menu_item_name, quantity: 0, revenue: 0 };
        byName[it.menu_item_name].quantity += it.quantity;
        byName[it.menu_item_name].revenue += it.quantity * it.unit_price;
      });
      const breakdown = Object.values(byName).sort((a, b) => b.revenue - a.revenue);
      return envelopeOk({ period, breakdown });
    },
  };

  // ---------------------------------------------------------------------
  // 6. EXPORT
  // ---------------------------------------------------------------------
  seed();
  global.ARIN_DB = ARIN_DB;
  global.ARIN_REALTIME = ARIN_REALTIME;
  global.ARIN_UTIL = { uid, nowIso, STATUS_ORDER };
})(window);

/*
 * PRODUCTION MAPPING (what to replace when wiring to a real backend):
 * ----------------------------------------------------------------------
 * ARIN_DB.updateRestaurantProfile   -> PATCH /merchant/restaurant                (new endpoint, owner-only)
 * ARIN_DB.listMenuItemsForOwner     -> GET   /merchant/menu                      (new endpoint, owner-only)
 * ARIN_DB.createMenuItem            -> POST  /merchant/menu
 * ARIN_DB.updateMenuItem            -> PATCH /merchant/menu/{menu_id}
 * ARIN_DB.deleteMenuItem            -> DELETE /merchant/menu/{menu_id}
 * ARIN_DB.listTables/createTable/deleteTable -> /merchant/tables endpoints (new)
 * ARIN_DB.adminLogin                -> POST  /admin/auth/login                   (fully separate auth realm from merchant JWTs)
 * ARIN_DB.adminListRestaurants      -> GET   /admin/restaurants
 * ARIN_DB.adminGetSalesSeries       -> GET   /admin/analytics/sales?restaurant_id=&period=
 * ARIN_DB.adminGetMenuBreakdown     -> GET   /admin/analytics/menu-breakdown?restaurant_id=&period=
 * All of the above are NEW endpoints — none exist yet in ARIN-API-QR-001 v1.0.
 * merchant_users.role should be added as a NOT NULL column, default 'staff',
 * CHECK (role IN ('owner','staff')) in ARIN-DB-QR-001 §5.
 */

</script>

<script>
/* =========================================================================
 * ARIN OWNER PORTAL
 * Tabs: Live Orders / Sales & Analytics / Menu Management / Restaurant
 * Settings / Tables & QR. Every write here is scoped to session.restaurant_id
 * — an owner can only ever see or edit their own restaurant (AC-6.3 pattern).
 * ========================================================================= */
const app = document.getElementById('app');
const state = {
  session: ARIN_DB.getSession(),
  tab: 'orders',
  salesPeriod: 'day',
  chart: null,
  qrBaseUrl: localStorage.getItem('arin_qr_owner_base_url') || 'customer-app.html',
};

function money(n) { return '฿' + Number(n).toLocaleString('th-TH'); }
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'เมื่อครู่'; if (s < 3600) return Math.floor(s / 60) + ' นาทีที่แล้ว'; return Math.floor(s / 3600) + ' ชม.ที่แล้ว';
}

const STATUS_LABEL = { pending: 'รอรับออเดอร์', accepted: 'รับออเดอร์แล้ว', preparing: 'กำลังปรุง', ready: 'พร้อมเสิร์ฟ', completed: 'เสร็จสิ้น' };
const STATUS_COLOR = { pending: 'bg-flamingo-500', accepted: 'bg-navy-600', preparing: 'bg-amber-500', ready: 'bg-emerald-500' };
const NEXT_STATUS = { pending: 'accepted', accepted: 'preparing', preparing: 'ready', ready: 'completed' };
const NEXT_LABEL = { pending: 'รับออเดอร์', accepted: 'เริ่มปรุง', preparing: 'พร้อมเสิร์ฟแล้ว', ready: 'ส่งมอบแล้ว' };
const PERIOD_LABEL = { day: 'รายวัน', week: 'รายสัปดาห์', month: 'รายเดือน', year: 'รายปี' };

/* -------------------------------------------------------------------------
 * LOGIN / ACCESS GATE — same merchant_users table as the staff order
 * console, but this portal refuses anyone whose role isn't 'owner'.
 * ---------------------------------------------------------------------- */
function renderLogin(errorMsg) {
  app.innerHTML = `
    <div class="min-h-screen flex items-center justify-center px-6 bg-navy-900">
      <div class="w-full max-w-sm fade-in">
        <div class="w-12 h-12 rounded-2xl bg-flamingo-500 flex items-center justify-center font-display font-bold text-white text-lg mb-6">A</div>
        <h1 class="font-display font-semibold text-2xl text-white mb-1">Owner Portal</h1>
        <p class="text-white/40 text-sm mb-8">สำหรับเจ้าของร้านเท่านั้น</p>
        ${errorMsg ? `<div class="bg-flamingo-500/10 border border-flamingo-500/30 text-flamingo-300 text-sm rounded-xl px-4 py-3 mb-4">${escapeHtml(errorMsg)}</div>` : ''}
        <div class="space-y-3">
          <input id="login-email" type="email" placeholder="อีเมล" value="demo@arin.co" class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm">
          <input id="login-password" type="password" placeholder="รหัสผ่าน" value="demo1234" class="w-full bg-white/5 border border-white/10 text-white placeholder-white/30 rounded-xl px-4 py-3 text-sm">
          <button id="login-btn" class="w-full py-3.5 rounded-xl bg-flamingo-500 text-white font-semibold active:scale-[0.98] transition">เข้าสู่ระบบ</button>
        </div>
        <p class="text-white/30 text-xs mt-5">โหมดทดสอบ: demo@arin.co / demo1234</p>
        <p class="text-white/30 text-xs">(ร้านที่สอง: manee@arin.co / manee1234)</p>
      </div>
    </div>`;
  document.getElementById('login-btn').addEventListener('click', () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const res = ARIN_DB.merchantLogin(email, password);
    if (!res.success) { renderLogin(res.error.message); return; }
    if (res.data.role !== 'owner') { ARIN_DB.logout(); renderLogin('บัญชีนี้เป็นพนักงาน ไม่มีสิทธิ์เข้า Owner Portal — ใช้หน้ารับออเดอร์แทน'); return; }
    state.session = ARIN_DB.getSession();
    scheduleTokenRefresh();
    renderShell();
  });
}

function renderForbidden() {
  app.innerHTML = `
    <div class="min-h-screen flex flex-col items-center justify-center px-8 text-center bg-navy-900">
      <p class="text-4xl mb-4">🔒</p>
      <h1 class="font-display font-semibold text-xl text-white mb-2">หน้านี้สำหรับเจ้าของร้านเท่านั้น</h1>
      <p class="text-white/40 text-sm mb-6">บัญชีพนักงานใช้หน้ารับออเดอร์ปกติได้ตามเดิม</p>
      <a href="merchant-dashboard.html" class="px-5 py-3 rounded-xl bg-flamingo-500 text-white text-sm font-medium">ไปหน้ารับออเดอร์</a>
    </div>`;
}

let refreshTimer = null;
function scheduleTokenRefresh() {
  clearTimeout(refreshTimer);
  const refreshInMs = (state.session.expires_in - 300) * 1000;
  refreshTimer = setTimeout(() => {
    const res = ARIN_DB.refreshToken(state.session.refresh_token);
    if (res.success) { state.session = ARIN_DB.getSession(); scheduleTokenRefresh(); }
    else renderLogin('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
  }, Math.max(refreshInMs, 5000));
}

/* -------------------------------------------------------------------------
 * SHELL — header + tab bar, shared by every tab
 * ---------------------------------------------------------------------- */
function renderShell() {
  const restaurant = ARIN_DB.updateRestaurantProfile(state.session.restaurant_id, {}).data; // read-only fetch via no-op patch
  const tabs = [
    { id: 'orders', label: 'ออเดอร์สด' },
    { id: 'sales', label: 'ยอดขาย' },
    { id: 'menu', label: 'จัดการเมนู' },
    { id: 'settings', label: 'ตั้งค่าร้าน' },
    { id: 'tables', label: 'โต๊ะ & QR' },
  ];
  app.innerHTML = `
    <header class="bg-navy-900 text-white px-6 py-5 sticky top-0 z-10">
      <div class="max-w-6xl mx-auto flex items-center justify-between">
        <div>
          <p class="text-flamingo-300 text-[11px] font-semibold tracking-wide uppercase">Owner Portal</p>
          <h1 class="font-display font-semibold text-xl">${escapeHtml(restaurant.name)}</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-[11px] text-white/40 hidden sm:block">${state.session.email}</span>
          <button id="logout-btn" class="text-xs bg-white/10 hover:bg-white/15 px-3 py-2 rounded-lg">ออกจากระบบ</button>
        </div>
      </div>
      <div class="max-w-6xl mx-auto flex gap-1.5 mt-4 overflow-x-auto pb-1">
        ${tabs.map(t => `<button data-tab="${t.id}" class="tab-btn whitespace-nowrap text-sm font-medium px-4 py-2 rounded-lg ${state.tab === t.id ? 'tab-active' : 'bg-white/5 text-white/60'}">${t.label}</button>`).join('')}
      </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6" id="tab-content"></main>
  `;
  document.getElementById('logout-btn').addEventListener('click', () => { ARIN_DB.logout(); clearTimeout(refreshTimer); location.reload(); });
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => { state.tab = b.dataset.tab; renderShell(); }));

  const content = document.getElementById('tab-content');
  if (state.tab === 'orders') renderOrdersTab(content);
  else if (state.tab === 'sales') renderSalesTab(content);
  else if (state.tab === 'menu') renderMenuTab(content);
  else if (state.tab === 'settings') renderSettingsTab(content, restaurant);
  else if (state.tab === 'tables') renderTablesTab(content, restaurant);
}

/* -------------------------------------------------------------------------
 * TAB: Live Orders (same behavior as the staff dashboard, so an owner
 * never has to juggle two logins to keep an eye on the floor)
 * ---------------------------------------------------------------------- */
function renderOrdersTab(root) {
  const orders = ARIN_DB.listMerchantOrders(state.session.restaurant_id).data.orders;
  root.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display font-semibold text-navy-900">ออเดอร์ที่ต้องดำเนินการ (${orders.length})</h2>
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
      ${orders.length === 0 ? `<div class="col-span-full text-center py-24 text-slate-400"><p class="text-4xl mb-3">🧾</p><p class="text-sm">ยังไม่มีออเดอร์เข้ามา</p></div>` : orders.map(o => `
        <div class="bg-white rounded-2xl shadow-card p-4">
          <div class="flex items-start justify-between mb-2">
            <div><p class="font-display font-semibold text-navy-900">โต๊ะ ${escapeHtml(o.table_number)}</p><p class="text-[11px] text-slate-400">#${o.order_id.slice(-6)} • ${timeAgo(o.created_at)}</p></div>
            <span class="text-[11px] font-semibold px-2.5 py-1 rounded-full text-white ${STATUS_COLOR[o.status]}">${STATUS_LABEL[o.status]}</span>
          </div>
          <div class="flex items-center justify-between text-sm mb-3"><span class="text-slate-500">${o.item_count} รายการ</span><span class="font-display font-semibold text-navy-900">${money(o.total)}</span></div>
          ${NEXT_STATUS[o.status] ? `<button data-advance="${o.order_id}" data-current="${o.status}" class="advance-btn w-full py-2.5 rounded-xl bg-navy-900 text-white text-sm font-medium">${NEXT_LABEL[o.status]} →</button>` : ''}
        </div>`).join('')}
    </div>`;
  root.querySelectorAll('.advance-btn').forEach(b => b.addEventListener('click', () => {
    const res = ARIN_DB.updateOrderStatus(b.dataset.advance, state.session.restaurant_id, NEXT_STATUS[b.dataset.current]);
    if (!res.success) { alert(res.error.message); return; }
    renderOrdersTab(root);
  }));
}

/* -------------------------------------------------------------------------
 * TAB: Sales & Analytics — day/week/month/year revenue chart + top menu
 * items by revenue, scoped to this restaurant only.
 * ---------------------------------------------------------------------- */
function renderSalesTab(root) {
  const seriesRes = ARIN_DB.adminGetSalesSeries(state.session.restaurant_id, state.salesPeriod);
  const breakdownRes = ARIN_DB.adminGetMenuBreakdown(state.session.restaurant_id, state.salesPeriod);
  const series = seriesRes.data.series;
  const totalRevenue = series.reduce((s, p) => s + p.revenue, 0);
  const totalOrders = series.reduce((s, p) => s + p.orders, 0);
  const avgTicket = totalOrders > 0 ? totalRevenue / totalOrders : 0;

  root.innerHTML = `
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
      <h2 class="font-display font-semibold text-navy-900">ยอดขาย</h2>
      <div class="flex gap-1.5 bg-white rounded-xl p-1 shadow-card">
        ${Object.keys(PERIOD_LABEL).map(p => `<button data-period="${p}" class="period-btn text-xs font-medium px-3 py-1.5 rounded-lg ${state.salesPeriod === p ? 'bg-navy-900 text-white' : 'text-slate-500'}">${PERIOD_LABEL[p]}</button>`).join('')}
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-5">
      <div class="bg-white rounded-2xl shadow-card p-4"><p class="text-xs text-slate-400 mb-1">ยอดขายรวม</p><p class="font-display font-semibold text-lg text-navy-900">${money(totalRevenue)}</p></div>
      <div class="bg-white rounded-2xl shadow-card p-4"><p class="text-xs text-slate-400 mb-1">จำนวนออเดอร์</p><p class="font-display font-semibold text-lg text-navy-900">${totalOrders}</p></div>
      <div class="bg-white rounded-2xl shadow-card p-4"><p class="text-xs text-slate-400 mb-1">ยอดเฉลี่ย/ออเดอร์</p><p class="font-display font-semibold text-lg text-navy-900">${money(Math.round(avgTicket))}</p></div>
    </div>

    <div class="bg-white rounded-2xl shadow-card p-4 mb-5">
      <p class="text-sm font-medium text-navy-900 mb-3">ยอดขายตามช่วงเวลา (${PERIOD_LABEL[state.salesPeriod]})</p>
      <div class="h-64"><canvas id="sales-chart"></canvas></div>
    </div>

    <div class="bg-white rounded-2xl shadow-card p-4">
      <p class="text-sm font-medium text-navy-900 mb-3">เมนูขายดี (${PERIOD_LABEL[state.salesPeriod]})</p>
      ${breakdownRes.data.breakdown.length === 0 ? `<p class="text-sm text-slate-400 py-6 text-center">ยังไม่มีข้อมูลในช่วงนี้</p>` : `
      <div class="space-y-2">
        ${breakdownRes.data.breakdown.slice(0, 8).map((m, i) => `
          <div class="flex items-center justify-between text-sm py-2 border-b border-navy-900/5 last:border-0">
            <div class="flex items-center gap-2 min-w-0"><span class="text-slate-300 font-display font-semibold w-4">${i + 1}</span><span class="text-navy-900 truncate">${escapeHtml(m.name)}</span></div>
            <div class="flex items-center gap-4 flex-shrink-0"><span class="text-slate-400 text-xs">${m.quantity} ชิ้น</span><span class="font-display font-semibold text-navy-900">${money(m.revenue)}</span></div>
          </div>`).join('')}
      </div>`}
    </div>
  `;

  root.querySelectorAll('.period-btn').forEach(b => b.addEventListener('click', () => { state.salesPeriod = b.dataset.period; renderSalesTab(root); }));

  if (state.chart) { state.chart.destroy(); state.chart = null; }
  const ctx = document.getElementById('sales-chart');
  state.chart = new Chart(ctx, {
    type: state.salesPeriod === 'day' || state.salesPeriod === 'week' ? 'bar' : 'line',
    data: {
      labels: series.map(p => p.label),
      datasets: [{ label: 'ยอดขาย (฿)', data: series.map(p => p.revenue), backgroundColor: 'rgba(255,92,141,0.55)', borderColor: '#FF5C8D', borderWidth: 2, borderRadius: 6, tension: 0.3, fill: state.salesPeriod !== 'day' && state.salesPeriod !== 'week' }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: (v) => '฿' + v.toLocaleString('th-TH') }, grid: { color: '#EEF0F3' } }, x: { grid: { display: false } } },
    },
  });
}

/* -------------------------------------------------------------------------
 * TAB: Menu Management — add / edit / toggle-availability / delete
 * ---------------------------------------------------------------------- */
function renderMenuTab(root) {
  const menu = ARIN_DB.listMenuItemsForOwner(state.session.restaurant_id).data.menu;
  root.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-display font-semibold text-navy-900">จัดการเมนู (${menu.length})</h2>
      <button id="add-menu-btn" class="text-sm bg-flamingo-500 text-white font-medium px-4 py-2 rounded-xl">+ เพิ่มเมนูใหม่</button>
    </div>
    <div id="menu-form-slot"></div>
    <div class="grid sm:grid-cols-2 gap-3" id="menu-list">
      ${menu.map(renderMenuRow).join('')}
    </div>
  `;
  document.getElementById('add-menu-btn').addEventListener('click', () => showMenuForm(null));
  bindMenuRowEvents();
}

function renderMenuRow(m) {
  return `
    <div class="bg-white rounded-2xl shadow-card p-4 ${m.available ? '' : 'opacity-60'}" data-row="${m.id}">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <p class="font-medium text-navy-900 text-sm truncate">${escapeHtml(m.name)}</p>
          <p class="text-xs text-slate-400 truncate">${escapeHtml(m.category)} • ${money(m.price)}</p>
        </div>
        <label class="flex items-center gap-1.5 text-[11px] text-slate-500 flex-shrink-0 cursor-pointer">
          <input type="checkbox" data-toggle="${m.id}" ${m.available ? 'checked' : ''} class="accent-flamingo-500"> เปิดขาย
        </label>
      </div>
      <p class="text-xs text-slate-400 mt-1 line-clamp-2">${escapeHtml(m.description || '')}</p>
      <div class="flex gap-2 mt-3">
        <button data-edit="${m.id}" class="flex-1 py-2 rounded-lg bg-navy-900/5 text-navy-900 text-xs font-medium">แก้ไข</button>
        <button data-delete="${m.id}" class="flex-1 py-2 rounded-lg bg-flamingo-500/10 text-flamingo-500 text-xs font-medium">ลบ</button>
      </div>
    </div>`;
}

function bindMenuRowEvents() {
  document.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('change', () => {
    ARIN_DB.updateMenuItem(el.dataset.toggle, state.session.restaurant_id, { available: el.checked });
    renderMenuTab(document.getElementById('tab-content'));
  }));
  document.querySelectorAll('[data-edit]').forEach(el => el.addEventListener('click', () => {
    const item = ARIN_DB.listMenuItemsForOwner(state.session.restaurant_id).data.menu.find(m => m.id === el.dataset.edit);
    showMenuForm(item);
  }));
  document.querySelectorAll('[data-delete]').forEach(el => el.addEventListener('click', () => {
    if (!confirm('ยืนยันลบเมนูนี้?')) return;
    const res = ARIN_DB.deleteMenuItem(el.dataset.delete, state.session.restaurant_id);
    if (!res.success) { alert(res.error.message); return; } // e.g. MENU_ITEM_IN_USE
    renderMenuTab(document.getElementById('tab-content'));
  }));
}

function showMenuForm(item) {
  const slot = document.getElementById('menu-form-slot');
  const isEdit = !!item;
  slot.innerHTML = `
    <div class="bg-white rounded-2xl shadow-card p-4 mb-4 fade-in">
      <p class="font-medium text-navy-900 text-sm mb-3">${isEdit ? 'แก้ไขเมนู' : 'เพิ่มเมนูใหม่'}</p>
      <div class="grid sm:grid-cols-2 gap-3">
        <input id="mf-name" type="text" placeholder="ชื่อเมนู" value="${escapeHtml(item?.name || '')}" class="border border-navy-900/10 rounded-lg px-3 py-2 text-sm">
        <input id="mf-category" type="text" placeholder="หมวดหมู่ (เช่น จานหลัก)" value="${escapeHtml(item?.category || '')}" class="border border-navy-900/10 rounded-lg px-3 py-2 text-sm">
        <input id="mf-price" type="number" min="0" step="1" placeholder="ราคา" value="${item?.price ?? ''}" class="border border-navy-900/10 rounded-lg px-3 py-2 text-sm">
        <input id="mf-image" type="url" placeholder="ลิงก์รูปภาพ (ไม่บังคับ)" value="${escapeHtml(item?.image_url || '')}" class="border border-navy-900/10 rounded-lg px-3 py-2 text-sm">
      </div>
      <textarea id="mf-description" placeholder="คำอธิบายเมนู" rows="2" class="w-full border border-navy-900/10 rounded-lg px-3 py-2 text-sm mt-3">${escapeHtml(item?.description || '')}</textarea>
      <div class="flex gap-2 mt-3">
        <button id="mf-save" class="flex-1 py-2.5 rounded-xl bg-flamingo-500 text-white text-sm font-semibold">${isEdit ? 'บันทึกการแก้ไข' : 'เพิ่มเมนู'}</button>
        <button id="mf-cancel" class="px-4 py-2.5 rounded-xl bg-navy-900/5 text-navy-900 text-sm">ยกเลิก</button>
      </div>
      <p id="mf-error" class="text-flamingo-500 text-xs mt-2 hidden"></p>
    </div>`;
  document.getElementById('mf-cancel').addEventListener('click', () => { slot.innerHTML = ''; });
  document.getElementById('mf-save').addEventListener('click', () => {
    const payload = {
      name: document.getElementById('mf-name').value,
      category: document.getElementById('mf-category').value || 'เมนู',
      price: parseFloat(document.getElementById('mf-price').value),
      image_url: document.getElementById('mf-image').value,
      description: document.getElementById('mf-description').value,
    };
    const res = isEdit ? ARIN_DB.updateMenuItem(item.id, state.session.restaurant_id, payload) : ARIN_DB.createMenuItem(state.session.restaurant_id, payload);
    if (!res.success) {
      const err = document.getElementById('mf-error');
      err.textContent = res.error.message; err.classList.remove('hidden');
      return;
    }
    slot.innerHTML = '';
    renderMenuTab(document.getElementById('tab-content'));
  });
}

/* -------------------------------------------------------------------------
 * TAB: Restaurant Settings — name, phone, logo, open/closed toggle
 * ---------------------------------------------------------------------- */
function renderSettingsTab(root, restaurant) {
  root.innerHTML = `
    <div class="max-w-xl">
      <h2 class="font-display font-semibold text-navy-900 mb-4">ตั้งค่าร้าน</h2>
      <div class="bg-white rounded-2xl shadow-card p-5 space-y-4">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">ชื่อร้าน</label>
          <input id="st-name" type="text" value="${escapeHtml(restaurant.name)}" class="w-full border border-navy-900/10 rounded-lg px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">เบอร์โทร</label>
          <input id="st-phone" type="tel" value="${escapeHtml(restaurant.phone || '')}" class="w-full border border-navy-900/10 rounded-lg px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">ลิงก์โลโก้ร้าน (ไม่บังคับ)</label>
          <input id="st-logo" type="url" value="${escapeHtml(restaurant.logo_url || '')}" class="w-full border border-navy-900/10 rounded-lg px-3 py-2.5 text-sm">
        </div>
        <div class="flex items-center justify-between bg-paper rounded-xl px-4 py-3">
          <div>
            <p class="text-sm font-medium text-navy-900">สถานะร้าน</p>
            <p class="text-xs text-slate-400">ปิดชั่วคราวจะบล็อกลูกค้าไม่ให้สั่งอาหารทันที</p>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input id="st-active" type="checkbox" class="sr-only peer" ${restaurant.is_active ? 'checked' : ''}>
            <div class="w-11 h-6 bg-navy-900/20 peer-checked:bg-flamingo-500 rounded-full transition"></div>
            <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
          </label>
        </div>
        <button id="st-save" class="w-full py-3 rounded-xl bg-navy-900 text-white text-sm font-semibold">บันทึกการตั้งค่า</button>
        <p id="st-saved" class="text-emerald-600 text-xs text-center hidden">บันทึกแล้ว</p>
      </div>
    </div>`;
  document.getElementById('st-save').addEventListener('click', () => {
    ARIN_DB.updateRestaurantProfile(state.session.restaurant_id, {
      name: document.getElementById('st-name').value.trim() || restaurant.name,
      phone: document.getElementById('st-phone').value.trim(),
      logo_url: document.getElementById('st-logo').value.trim(),
      is_active: document.getElementById('st-active').checked,
    });
    const saved = document.getElementById('st-saved');
    saved.classList.remove('hidden');
    setTimeout(() => renderShell(), 700);
  });
}

/* -------------------------------------------------------------------------
 * TAB: Tables & QR — add/remove tables, generate a QR per table that
 * encodes the exact link customer-app.html expects (?restaurant_id=&table=)
 * ---------------------------------------------------------------------- */
function renderTablesTab(root) {
  const tables = ARIN_DB.listTables(state.session.restaurant_id).data.tables;
  root.innerHTML = `
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
      <h2 class="font-display font-semibold text-navy-900">โต๊ะ & QR Code (${tables.length})</h2>
      <div class="flex items-center gap-2">
        <input id="new-table-number" type="text" placeholder="เลขโต๊ะ เช่น 09" class="border border-navy-900/10 rounded-lg px-3 py-2 text-sm w-32">
        <button id="add-table-btn" class="bg-flamingo-500 text-white text-sm font-medium px-4 py-2 rounded-xl">+ เพิ่มโต๊ะ</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-card p-4 mb-5">
      <label class="text-xs text-slate-500 mb-1 block">URL ฐานของหน้าเมนูลูกค้า (แก้ตอนย้ายไปโดเมนจริง)</label>
      <input id="base-url-input" type="text" value="${escapeHtml(state.qrBaseUrl)}" class="w-full border border-navy-900/10 rounded-lg px-3 py-2 text-sm">
      <p class="text-[11px] text-slate-400 mt-1">ตอนนี้ QR จะชี้ไปที่ไฟล์ customer-app.html — เปลี่ยนเป็นโดเมนจริงได้เมื่อขึ้น production</p>
    </div>

    <p id="table-error" class="text-flamingo-500 text-xs mb-3 hidden"></p>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4" id="table-grid">
      ${tables.map(t => `
        <div class="bg-white rounded-2xl shadow-card p-4 flex flex-col items-center text-center" data-table-card="${t.id}">
          <p class="font-display font-semibold text-navy-900 mb-2">โต๊ะ ${escapeHtml(t.table_number)}</p>
          <div id="qr-${t.id}" class="mb-3"></div>
          <p class="text-[11px] text-slate-400 break-all mb-3">${escapeHtml(ARIN_DB.buildCustomerLink(state.qrBaseUrl, state.session.restaurant_id, t.table_number))}</p>
          <div class="flex gap-2 w-full">
            <button data-download="${t.id}" data-number="${t.table_number}" class="flex-1 py-2 rounded-lg bg-navy-900 text-white text-xs font-medium">ดาวน์โหลด QR</button>
            <button data-delete-table="${t.id}" class="px-3 py-2 rounded-lg bg-flamingo-500/10 text-flamingo-500 text-xs font-medium">ลบ</button>
          </div>
        </div>`).join('')}
    </div>
  `;

  document.getElementById('base-url-input').addEventListener('change', (e) => {
    state.qrBaseUrl = e.target.value.trim() || 'customer-app.html';
    localStorage.setItem('arin_qr_owner_base_url', state.qrBaseUrl);
    renderTablesTab(root);
  });

  document.getElementById('add-table-btn').addEventListener('click', () => {
    const num = document.getElementById('new-table-number').value;
    const res = ARIN_DB.createTable(state.session.restaurant_id, num);
    const errEl = document.getElementById('table-error');
    if (!res.success) { errEl.textContent = res.error.message; errEl.classList.remove('hidden'); return; }
    renderTablesTab(root);
  });

  document.querySelectorAll('[data-delete-table]').forEach(b => b.addEventListener('click', () => {
    if (!confirm('ยืนยันลบโต๊ะนี้?')) return;
    const res = ARIN_DB.deleteTable(b.dataset.deleteTable, state.session.restaurant_id);
    if (!res.success) { alert(res.error.message); return; } // e.g. TABLE_HAS_ACTIVE_ORDER
    renderTablesTab(root);
  }));

  // Render each QR code into its slot, then wire up "download as PNG".
  tables.forEach(t => {
    const link = ARIN_DB.buildCustomerLink(state.qrBaseUrl, state.session.restaurant_id, t.table_number);
    new QRCode(document.getElementById('qr-' + t.id), { text: link, width: 128, height: 128, colorDark: '#0A1830', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  });
  document.querySelectorAll('[data-download]').forEach(b => b.addEventListener('click', () => {
    const canvas = document.querySelector('#qr-' + b.dataset.download + ' canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = `QR-โต๊ะ-${b.dataset.number}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }));
}

/* -------------------------------------------------------------------------
 * BOOT
 * ---------------------------------------------------------------------- */
function boot() {
  if (!state.session) { renderLogin(); return; }
  if (state.session.role !== 'owner') { renderForbidden(); return; }
  scheduleTokenRefresh();
  renderShell();
}
boot();
</script>
</body>
</html>
